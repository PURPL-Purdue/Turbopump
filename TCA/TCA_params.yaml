###################################################################################################
#                        Welcome to the Marlin Project's source of truth!                         #
#                                                                                                 #
# Why are we doing this?:                                                                         #
#   As our project grows, it gets hard to keep track of the values on everyone's subsystems as    #
#   they get more and more complicated. Consolidating all of our important design parameters,     #
#   inputs and outputs in the same file helps reduce miscommunications and ensures everyone is in #
#   the same page.                                                                                #
# What the hell is a YAML?:                                                                       #
#   YAML is a type of files that allows people to write data in a way that is readable to both a  #
#   person AND a computer. As opposed to other filetypes like JSON and XML, the syntax is pretty  #
#   nice and readable and will thus make a good reference for programmers and non-programmers in  #
#   the team.                                                                                     #
# (video explaining how to use a YAML) https://www.youtube.com/watch?v=BEki_rsWu4E                #
#                                                                                                 #
# Basic rules:                                                                                    #
#   1. Be clear with naming, limit acronym usage on any parameters you add                        #
#   2. Write the units in a comment using parenthesis and maintain unit system consistency        #
#   3. Write your name next to any parameters you own, notify owners of inputs before             #
#      changing them                                                                              #
#   4. Do not change OUTPUTS manually, only code should do this!!!                                #
#   5. No slop, only throw a value here if it actually is useful information. EX: things like     #
#      shaft speed, design propellant temps... Not things like super specific shaft dimensions or #
#      random off-design conditions                                                               #
#   6. Check if the value is already there before adding it                                       #
#                                                                                                 #
# If you have any questions about how to use this document, reach out to Alejandro Diaz Contreras #
# adiazcon@purdue.edu                                                                             #
#                                                                                                 #
###################################################################################################

#PROPELLANTS
oxidizer: LOX  #Daniel Lysenko Dudnyk
fuel: Isopropanol  #Daniel Lysenko Dudnyk

#Thrust Chamber Assembly Design Setpoints
thrust: 5000  #(lbf) #Daniel Lysenko Dudnyk 
tca_chamber_pressure: 500  #(psi) #Daniel Lysenko Dudnyk
oxidizer_fuel_ratio: 1.6  #(Unitless) #Daniel Lysenko Dudnyk
turbopump_mdot: 23.630   #Turbopump mdot depends on thrust, chamber pressure, and O/F ratio, so it is not an input. For O/F = 1.6, mdot is approximately 23.630 lbm/s.

#Assumed efficiies 
c_star_efficiency: 0.875  #(Unitless) Devin Morris
thrust_coefficient_efficiency: 0.875  #(Unitless) Devin Morris

#Pressures
ambient_pressure: 14.7  #(psi) Devin Morris
tca_exit_pressure: 12.0  #(psi) Devin Morris


#Combustion chamber Design Parameters
characteristic_length: 40  #(in)  Daniel Lysenko Dudnyk
tca_convergent_half_angle: 45  #(degrees) Devin Morris
bell_nozzle_l_percent: 80  #(%) Devin Morris

#Contraction and expansion ratios
tca_contraction_ratio: 2.848  #(Unitless) Daniel Lysenko Dudnyk - Derived from injector plate diameter
tca_expansion_ratio: 6.3253  #(Unitless) Daniel Lysenko Dudnyk

#Thrust Chamber Assembly Calculated Design Parameters
tca_throat_diameter: 3.0746  #(in) Daniel Lysenko Dudnyk
tca_chamber_diameter: 5.189  #(in) Daniel Lysenko Dudnyk
tca_exit_diameter: 7.7328  #(in) Daniel Lysenko Dudnyk
tca_chamber_length: 13.3587  #(in) Daniel Lysenko Dudnyk

chamber_molecular_weight: 21.625 #(lbm/lbmole) Daniel Lysenko Dudnyk
chamber_thermal_conductivity: 2.4321 #(mcal/cm-K-s) Daniel Lysenko Dudnyk

chamber_gamma_thermodynamic: 1.1461   # use for performance calcs
throat_gamma_thermodynamic:  1.1500   # use for nozzle throat calcs
chamber_gamma_transport:     1.1323   # use for Bartz / heat transfer ONLY


#Injector Plate Design Parameters 
injector_plate_thickness_ipa: 0.005  #(m) Daniel Lysenko Dudnyk
injector_plate_thickness_ox: 0.009  #(m) Daniel Lysenko Dudnyk

impinge_distance: 0.3  #(in) Joaquin Alarcon  

discharge_coefficient_lox: 0.8  #(Unitless) Daniel Lysenko Dudnyk
discharge_coefficient_ipa: 0.8  #(Unitless) Daniel Lysenko Dudnyk
discharge_coefficient_film: 0.8  #(Unitless) Daniel Lysenko Dudnyk

injector_number_of_holes_ipa: 80  #(Unitless) Daniel Lysenko Dudnyk
injector_number_of_holes_lox: 80  #(Unitless) Daniel Lysenko Dudnyk

##CHANGE
injector_hole_diameter_ipa: 1.2  #(mm) Daniel Lysenko Dudnyk #56 drill = 0.0472" = 1.2 mm
injector_hole_diameter_lox: 1.7018  #(mm) Daniel Lysenko Dudnyk #51 drill = 0.0670" = 1.7018 mm

th_ipa: 40 #degrees.
th_lox: 24.438 #degrees.

ipa_manifold_diameter: 5.0  # 5.0 mm  #(mm) Daniel Lysenko Dudnyk
lox_countersink_diameter: 3.048 #31 drill = 0.1200 in = 3.048 mm  #(mm) Daniel Lysenko Dudnyk

h_manifold_ox: 0.015  #[m] Daniel Lysenko Dudnyk

#Injector pressure data for 2.1 O/F
"Injector inlet pressure":
  LOX: 613.27 #psi
  IPA: 646.89 #psi
#Injector pressure drop for 2.1 O/F
"Pressure drop as % of chamber pressure":
  LOX: 22.7%
  IPA: 29.4%
